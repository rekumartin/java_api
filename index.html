<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Neon Cocktail Lounge</title>

<style>

body{
margin:0;
font-family:Segoe UI, Arial;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
background-size:400% 400%;
animation:bg 12s infinite alternate;
color:white;
text-align:center;
overflow-x:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

h1{
font-size:42px;
background:linear-gradient(90deg,#ff00cc,#00ffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin-right:5px;
}

button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:linear-gradient(90deg,#ff00cc,#00ffff);
color:white;
margin:4px;
}

#loading{
font-size:20px;
margin-top:20px;
display:none;
}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
padding:20px;
}

.card{
position:relative;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:16px;
padding:15px;
width:200px;
transition:0.4s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 20px rgba(0,255,255,0.6);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:12px;
}

.fav{
position:absolute;
top:10px;
right:10px;
cursor:pointer;
font-size:20px;
}

.rating{
cursor:pointer;
font-size:18px;
color:gold;
margin:6px 0;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
}

.modal-content{
background:#111;
margin:10% auto;
padding:20px;
border-radius:16px;
width:80%;
max-width:500px;
}

.close{
float:right;
cursor:pointer;
font-size:24px;
}

.particle{
position:fixed;
width:4px;
height:4px;
background:#00ffff;
border-radius:50%;
animation:float 10s linear infinite;
opacity:0.6;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

</style>

</head>

<body>

<h1>🍹 Ultimate Neon Cocktail Lounge</h1>

<input id="search" placeholder="Search cocktail">
<button onclick="loadCocktails()">Search</button>
<button onclick="randomCocktail()">Random Cocktail</button>

<div id="loading">Loading cocktails...</div>

<div class="container" id="container"></div>

<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">×</span>
<h2 id="modalTitle"></h2>
<img id="modalImg" style="width:200px;border-radius:12px">
<p id="modalText"></p>
</div>
</div>

<script>

function createCard(drink){

const container=document.getElementById("container");

const card=document.createElement("div");
card.className="card";

const fav=document.createElement("div");
fav.className="fav";

let favs=JSON.parse(localStorage.getItem("favs")||"[]");
fav.innerHTML=favs.includes(drink.idDrink)?"❤️":"♡";

fav.onclick=function(){

let favs=JSON.parse(localStorage.getItem("favs")||"[]");

if(favs.includes(drink.idDrink)){
favs=favs.filter(f=>f!==drink.idDrink);
}else{
favs.push(drink.idDrink);
}

localStorage.setItem("favs",JSON.stringify(favs));
location.reload();

};

const title=document.createElement("h3");
title.textContent=drink.strDrink;

const img=document.createElement("img");
img.src=drink.strDrinkThumb;

const rating=document.createElement("div");
rating.className="rating";

let saved=localStorage.getItem("rating_"+drink.idDrink);
rating.innerHTML=saved?saved:"☆☆☆☆☆";

rating.onclick=function(e){

let rect=this.getBoundingClientRect();
let stars=Math.ceil((e.clientX-rect.left)/rect.width*5);
let value="★★★★★".slice(0,stars)+"☆☆☆☆☆".slice(0,5-stars);

this.innerHTML=value;
localStorage.setItem("rating_"+drink.idDrink,value);

};

const btn=document.createElement("button");
btn.textContent="View";

btn.onclick=function(){
openModal(drink);
};

card.appendChild(fav);
card.appendChild(img);
card.appendChild(title);
card.appendChild(rating);
card.appendChild(btn);

container.appendChild(card);

}

async function loadRandomCocktails(){

const container=document.getElementById("container");
container.innerHTML="";

document.getElementById("loading").style.display="block";

let drinksMap=new Map();

while(drinksMap.size<10){

let res=await fetch("https://www.thecocktaildb.com/api/json/v1/1/random.php");
let data=await res.json();

let drink=data.drinks[0];

drinksMap.set(drink.idDrink,drink);

}

document.getElementById("loading").style.display="none";

drinksMap.forEach(drink=>{
createCard(drink);
});

}

function loadCocktails(){

const search=document.getElementById("search").value;

const container=document.getElementById("container");
container.innerHTML="";

if(search===""){
loadRandomCocktails();
return;
}

document.getElementById("loading").style.display="block";

fetch("https://www.thecocktaildb.com/api/json/v1/1/search.php?s="+search)
.then(res=>res.json())
.then(data=>{

document.getElementById("loading").style.display="none";

if(!data.drinks){
container.innerHTML="<h3>No cocktails found</h3>";
return;
}

data.drinks.forEach(drink=>{
createCard(drink);
});

});

}

function randomCocktail(){

const container=document.getElementById("container");
container.innerHTML="";

document.getElementById("loading").style.display="block";

fetch("https://www.thecocktaildb.com/api/json/v1/1/random.php")
.then(res=>res.json())
.then(data=>{

document.getElementById("loading").style.display="none";
createCard(data.drinks[0]);

});

}

function openModal(drink){

document.getElementById("modalTitle").textContent=drink.strDrink;
document.getElementById("modalImg").src=drink.strDrinkThumb;
document.getElementById("modalText").textContent=drink.strInstructions;

document.getElementById("modal").style.display="block";

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

document.getElementById("search").addEventListener("keypress", function(e){
if(e.key==="Enter"){
loadCocktails();
}
});

loadRandomCocktails();

for(let i=0;i<40;i++){

let p=document.createElement("div");
p.className="particle";

p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*10)+"s";

document.body.appendChild(p);

}

</script>

</body>
</html>
